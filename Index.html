document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

"<!DOCTYPE html>\n<html><head>\n<meta charset=\"utf-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1\">\n<script src=\"3752b5ea-a58d-4a91-b709-ceeb4cf1c3b2\"><\u002Fscript>\n<\u002Fhead>\n<body>\n<x-dc>\n<helmet>\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1\">\n<style>\n  body { margin:0; background:#EFEDE8; font-family:\"Helvetica Neue\",Helvetica,Arial,sans-serif; color:#232c3a; }\n  a { color:#B5432F; text-decoration:none; }\n  a:hover { color:#101E33; text-decoration:underline; }\n  input { font-family:inherit; }\n<\u002Fstyle>\n<\u002Fhelmet>\n\n<div style=\"max-width:1280px; margin:0 auto; padding:clamp(10px, 2vw, 22px) clamp(10px, 2.5vw, 24px) 48px; display:flex; flex-direction:column; gap:14px;\" data-screen-label=\"Tableau de bord DS90\">\n\n  <!-- ===== En-tête ===== -->\n  <div style=\"background:#101E33; color:#fff; border-radius:8px; padding:18px 22px; display:flex; align-items:center; justify-content:space-between; gap:18px; flex-wrap:wrap;\">\n    <div>\n      <div style=\"font-size:10px; letter-spacing:.14em; text-transform:uppercase; color:var(--ac,#E4604B); font-weight:700;\">Ébène Conseil — Offre DS90<\u002Fdiv>\n      <div style=\"font-size:21px; font-weight:700; letter-spacing:-.01em; margin-top:2px;\">Tableau de bord de production — livret + dispositif web<\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"display:flex; align-items:center; gap:18px; flex-wrap:wrap;\">\n      <label style=\"display:flex; align-items:center; gap:8px; font-size:11px; color:#B7C1D2;\">Démarrage (J0)\n        <input type=\"date\" value=\"{{ startDate }}\" onchange=\"{{ onStartDate }}\" style=\"background:#1B3157; border:1px solid #33456A; color:#fff; border-radius:4px; padding:5px 8px; font-size:11.5px;\">\n      <\u002Flabel>\n      <a href=\"Plan de production DS90.dc.html\" style=\"font-size:11.5px; color:#fff; border:1px solid #33456A; border-radius:4px; padding:6px 12px;\">Plan détaillé →<\u002Fa>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- ===== KPI ===== -->\n  <div style=\"display:grid; grid-template-columns:repeat(auto-fit, minmax(210px, 1fr)); gap:12px;\">\n    <div style=\"background:#fff; border:1px solid #DDE2EA; border-radius:8px; padding:13px 16px;\">\n      <div style=\"font-size:9.5px; letter-spacing:.1em; text-transform:uppercase; color:#8a93a3; font-weight:700;\">Avancement<\u002Fdiv>\n      <div style=\"font-size:26px; font-weight:700; color:#101E33; margin-top:3px;\">{{ kpiPct }}<span style=\"font-size:14px; color:#8a93a3;\"> %<\u002Fspan><\u002Fdiv>\n      <div style=\"height:5px; background:#E9EDF3; border-radius:3px; margin-top:7px; overflow:hidden;\"><div style=\"height:100%; width:{{ kpiPct }}%; background:var(--ac,#E4604B); border-radius:3px;\"><\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"background:#fff; border:1px solid #DDE2EA; border-radius:8px; padding:13px 16px;\">\n      <div style=\"font-size:9.5px; letter-spacing:.1em; text-transform:uppercase; color:#8a93a3; font-weight:700;\">Tâches terminées<\u002Fdiv>\n      <div style=\"font-size:26px; font-weight:700; color:#101E33; margin-top:3px;\">{{ kpiDone }}<span style=\"font-size:14px; color:#8a93a3;\"> / {{ kpiTotal }}<\u002Fspan><\u002Fdiv>\n      <div style=\"font-size:10.5px; color:#8a93a3; margin-top:6px;\">{{ kpiInProgress }} en cours<\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"background:#fff; border:1px solid #DDE2EA; border-radius:8px; padding:13px 16px;\">\n      <div style=\"font-size:9.5px; letter-spacing:.1em; text-transform:uppercase; color:#8a93a3; font-weight:700;\">Prochain jalon<\u002Fdiv>\n      <div style=\"font-size:16px; font-weight:700; color:var(--ac,#E4604B); margin-top:5px;\">{{ kpiNextCode }}<\u002Fdiv>\n      <div style=\"font-size:10.5px; color:#3a4356; margin-top:3px; line-height:1.35;\">{{ kpiNextName }}<\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"background:#fff; border:1px solid #DDE2EA; border-radius:8px; padding:13px 16px;\">\n      <div style=\"font-size:9.5px; letter-spacing:.1em; text-transform:uppercase; color:#8a93a3; font-weight:700;\">Fin estimée (J8)<\u002Fdiv>\n      <div style=\"font-size:20px; font-weight:700; color:#101E33; margin-top:5px;\">{{ kpiEnd }}<\u002Fdiv>\n      <div style=\"font-size:10.5px; color:#8a93a3; margin-top:3px;\">≈ 24 j ouvrés, impression comprise<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- ===== GANTT ===== -->\n  <div style=\"background:#fff; border:1px solid #DDE2EA; border-radius:8px; padding:16px 18px 14px; overflow-x:auto;\">\n    <div style=\"display:flex; align-items:baseline; justify-content:space-between; gap:12px; margin-bottom:10px; min-width:1080px;\">\n      <div style=\"font-size:14px; font-weight:700; color:#101E33;\">Diagramme de Gantt — 5 semaines, jours ouvrés<\u002Fdiv>\n      <div style=\"display:flex; gap:16px; font-size:10px; color:#55617a; align-items:center; flex-wrap:wrap;\">\n        <span style=\"display:flex; align-items:center; gap:5px;\"><span style=\"width:18px; height:10px; background:#E9EDF3; border:1px solid #B9C2D0; border-radius:2px;\"><\u002Fspan>à faire<\u002Fspan>\n        <span style=\"display:flex; align-items:center; gap:5px;\"><span style=\"width:18px; height:10px; background:#1B3157; border-radius:2px;\"><\u002Fspan>en cours<\u002Fspan>\n        <span style=\"display:flex; align-items:center; gap:5px;\"><span style=\"width:18px; height:10px; background:#3E7D5F; border-radius:2px;\"><\u002Fspan>fait<\u002Fspan>\n        <span style=\"display:flex; align-items:center; gap:5px;\"><span style=\"width:7px; height:7px; background:var(--ac,#E4604B); border-radius:50%;\"><\u002Fspan>chemin critique<\u002Fspan>\n        <span style=\"display:flex; align-items:center; gap:5px;\"><span style=\"width:8px; height:8px; background:#101E33; transform:rotate(45deg);\"><\u002Fspan>jalon<\u002Fspan>\n        <span style=\"font-style:italic;\">cliquer une barre pour changer son statut (enregistré)<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div style=\"position:relative; min-width:1080px;\">\n      <!-- Semaines -->\n      <div style=\"display:flex; border-bottom:2px solid #101E33;\">\n        <div style=\"width:250px; flex:none;\"><\u002Fdiv>\n        <div style=\"position:relative; flex:none; width:830px; height:20px;\">\n          <sc-for list=\"{{ weeks }}\" as=\"wk\" hint-placeholder-count=\"5\">\n            <div style=\"position:absolute; top:0; left:{{ wk.left }}px; width:170px; height:20px; border-left:1px solid #C9D1DC; padding:2px 0 0 7px; font-size:9.5px; font-weight:700; letter-spacing:.05em; color:#55617a; text-transform:uppercase;\">{{ wk.label }}<\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <!-- Jalons (losanges) -->\n      <div style=\"display:flex; border-bottom:1px solid #E4E8EF; background:#FAFBFC;\">\n        <div style=\"width:250px; flex:none; padding:0 10px; display:flex; align-items:center; font-size:9.5px; font-weight:700; letter-spacing:.08em; text-transform:uppercase; color:#8a93a3; height:38px;\">Jalons<\u002Fdiv>\n        <div style=\"position:relative; flex:none; width:830px; height:38px;\">\n          <sc-for list=\"{{ milestones }}\" as=\"m\" hint-placeholder-count=\"8\">\n            <div title=\"{{ m.tip }}\" style=\"position:absolute; left:{{ m.left }}px; top:15px; width:9px; height:9px; transform:rotate(45deg); background:{{ m.fill }}; border:1.5px solid #101E33; margin-left:-5px;\"><\u002Fdiv>\n            <div style=\"position:absolute; left:{{ m.left }}px; top:{{ m.lblTop }}px; transform:translateX(-50%); font-size:8.5px; font-weight:700; color:{{ m.lblCol }}; white-space:nowrap;\">{{ m.code }}<\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- Groupes + tâches -->\n      <sc-for list=\"{{ groups }}\" as=\"g\" hint-placeholder-count=\"3\">\n        <div style=\"display:flex; background:#F2F4F8; border-bottom:1px solid #E4E8EF;\">\n          <div style=\"width:250px; flex:none; padding:5px 10px; font-size:10px; font-weight:700; letter-spacing:.07em; text-transform:uppercase; color:#101E33;\">{{ g.name }}<\u002Fdiv>\n          <div style=\"flex:none; width:830px;\"><\u002Fdiv>\n        <\u002Fdiv>\n        <sc-for list=\"{{ g.tasks }}\" as=\"t\" hint-placeholder-count=\"7\">\n          <div style=\"display:flex; border-bottom:1px solid #EFF2F6; height:27px;\">\n            <div style=\"width:250px; flex:none; display:flex; align-items:center; gap:6px; padding:0 10px; overflow:hidden;\">\n              <sc-if value=\"{{ t.crit }}\" hint-placeholder-val=\"{{ false }}\"><span style=\"flex:none; width:6px; height:6px; border-radius:50%; background:var(--ac,#E4604B);\"><\u002Fspan><\u002Fsc-if>\n              <span title=\"{{ t.tip }}\" style=\"font-size:11px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; color:{{ t.lblCol }};\"><strong>{{ t.code }}<\u002Fstrong> · {{ t.name }}<\u002Fspan>\n            <\u002Fdiv>\n            <div style=\"position:relative; flex:none; width:830px; background-image:repeating-linear-gradient(to right, transparent 0px, transparent 169px, #EDF0F5 169px, #EDF0F5 170px);\">\n              <div onclick=\"{{ t.onClick }}\" title=\"{{ t.tip }}\" style=\"position:absolute; top:6px; left:{{ t.left }}px; width:{{ t.w }}px; height:15px; border-radius:3px; background:{{ t.bg }}; border:{{ t.border }}; cursor:pointer; box-sizing:border-box;\"><\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fsc-for>\n\n      <!-- Ligne aujourd'hui -->\n      <sc-if value=\"{{ showToday }}\" hint-placeholder-val=\"{{ false }}\">\n        <div style=\"position:absolute; top:20px; bottom:0; left:{{ todayX }}px; width:0; border-left:2px dashed var(--ac,#E4604B); pointer-events:none;\">\n          <div style=\"position:absolute; top:-2px; left:4px; font-size:8.5px; font-weight:700; color:var(--ac,#E4604B); white-space:nowrap;\">aujourd'hui<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- ===== Chemin critique + Risques ===== -->\n  <div style=\"display:grid; grid-template-columns:repeat(auto-fit, minmax(330px, 1fr)); gap:14px; align-items:start;\">\n    <div style=\"background:#101E33; border-radius:8px; padding:16px 18px; color:#fff;\">\n      <div style=\"font-size:13px; font-weight:700; margin-bottom:10px;\">Chemin critique <span style=\"font-weight:400; color:#B7C1D2; font-size:10.5px;\">— aucune impression sans cette chaîne<\u002Fspan><\u002Fdiv>\n      <sc-for list=\"{{ chain }}\" as=\"c\" hint-placeholder-count=\"9\">\n        <div style=\"display:flex; align-items:center; gap:9px; padding:4px 0; border-bottom:1px solid rgba(255,255,255,.08);\">\n          <span style=\"flex:none; width:16px; height:16px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:9px; font-weight:700; background:{{ c.dotBg }}; color:{{ c.dotCol }}; border:1px solid {{ c.dotBorder }};\">{{ c.mark }}<\u002Fspan>\n          <span style=\"font-size:11px; color:{{ c.txtCol }};\">{{ c.lbl }}<\u002Fspan>\n          <span style=\"margin-left:auto; font-size:9.5px; color:#8a93a3;\">{{ c.date }}<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fsc-for>\n      <div style=\"font-size:10px; color:#B7C1D2; line-height:1.5; margin-top:10px;\">QR <strong style=\"color:var(--ac,#E4604B);\">dynamique<\u002Fstrong> recommandé : la destination reste modifiable après tirage — mais la règle « destination en ligne et testée avant impression » demeure.<\u002Fdiv>\n    <\u002Fdiv>\n\n    <div style=\"background:#fff; border:1px solid #DDE2EA; border-radius:8px; padding:16px 18px;\">\n      <div style=\"font-size:13px; font-weight:700; color:#101E33; margin-bottom:10px;\">Risques majeurs &amp; parades<\u002Fdiv>\n      <div style=\"display:grid; grid-template-columns:repeat(auto-fit, minmax(250px, 1fr)); gap:2px 22px;\">\n        <sc-for list=\"{{ risks }}\" as=\"r\" hint-placeholder-count=\"8\">\n          <div style=\"padding:6px 0; border-bottom:1px solid #EFF2F6; font-size:10.5px; line-height:1.45;\">\n            <div style=\"font-weight:700; color:#101E33;\"><span style=\"color:var(--ac,#E4604B);\">▲<\u002Fspan> {{ r.t }}<\u002Fdiv>\n            <div style=\"color:#55617a; margin-top:1px;\">{{ r.p }}<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- ===== Checklists ===== -->\n  <div style=\"display:grid; grid-template-columns:repeat(auto-fit, minmax(300px, 1fr)); gap:14px; align-items:start;\">\n    <div style=\"background:#fff; border:1px solid #DDE2EA; border-top:3px solid #101E33; border-radius:8px; padding:14px 18px;\">\n      <div style=\"display:flex; justify-content:space-between; align-items:baseline; margin-bottom:8px;\">\n        <div style=\"font-size:13px; font-weight:700; color:#101E33;\">Checklist avant impression<\u002Fdiv>\n        <div style=\"font-size:10px; color:#8a93a3;\">{{ printCount }} — conditionne J7<\u002Fdiv>\n      <\u002Fdiv>\n      <sc-for list=\"{{ printList }}\" as=\"it\" hint-placeholder-count=\"8\">\n        <div onclick=\"{{ it.onClick }}\" style=\"display:flex; align-items:flex-start; gap:9px; padding:4px 0; cursor:pointer; border-bottom:1px solid #F3F5F8;\">\n          <span style=\"flex:none; width:13px; height:13px; margin-top:1px; border:1.5px solid #101E33; border-radius:2px; display:flex; align-items:center; justify-content:center; font-size:9px; font-weight:700; background:{{ it.boxBg }}; color:#fff;\">{{ it.mark }}<\u002Fspan>\n          <span style=\"font-size:11px; line-height:1.45; color:{{ it.col }};\">{{ it.label }}<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n    <div style=\"background:#fff; border:1px solid #DDE2EA; border-top:3px solid var(--ac,#E4604B); border-radius:8px; padding:14px 18px;\">\n      <div style=\"display:flex; justify-content:space-between; align-items:baseline; margin-bottom:8px;\">\n        <div style=\"font-size:13px; font-weight:700; color:#101E33;\">Checklist avant mise en ligne<\u002Fdiv>\n        <div style=\"font-size:10px; color:#8a93a3;\">{{ webCount }} — conditionne J3–J4<\u002Fdiv>\n      <\u002Fdiv>\n      <sc-for list=\"{{ webList }}\" as=\"it\" hint-placeholder-count=\"10\">\n        <div onclick=\"{{ it.onClick }}\" style=\"display:flex; align-items:flex-start; gap:9px; padding:4px 0; cursor:pointer; border-bottom:1px solid #F3F5F8;\">\n          <span style=\"flex:none; width:13px; height:13px; margin-top:1px; border:1.5px solid var(--ac,#E4604B); border-radius:2px; display:flex; align-items:center; justify-content:center; font-size:9px; font-weight:700; background:{{ it.boxBg2 }}; color:#fff;\">{{ it.mark }}<\u002Fspan>\n          <span style=\"font-size:11px; line-height:1.45; color:{{ it.col }};\">{{ it.label }}<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{\n  &quot;accent&quot;: { &quot;editor&quot;: &quot;color&quot;, &quot;default&quot;: &quot;#E4604B&quot;, &quot;tsType&quot;: &quot;string&quot;, &quot;options&quot;: [&quot;#E4604B&quot;, &quot;#C94F3D&quot;, &quot;#2E6F8E&quot;, &quot;#8A6D3B&quot;], &quot;section&quot;: &quot;Apparence&quot; }\n}\">\nclass Component extends DCLogic {\n  constructor(props) {\n    super(props);\n    let saved = {};\n    try { saved = JSON.parse(localStorage.getItem('ds90-suivi') || '{}'); } catch (e) {}\n    this.state = {\n      statuses: saved.statuses || {},\n      checks: saved.checks || {},\n      startDate: saved.startDate || '2026-07-13'\n    };\n    this.DAY = 34;\n\n    this.TASKS = [\n      { id:'A5', grp:0, name:'Critères + questionnaire + messages', resp:'Branco', val:'Branco', start:0, dur:3, crit:true, pre:'—' },\n      { id:'A1', grp:0, name:'Nom de domaine + URL cible', resp:'Concepteur', val:'Branco', start:0, dur:1, crit:true, pre:'—' },\n      { id:'A2' start:3, dur:1, crit:true, pre:'A1' },\n      { id:'W3', grp:2, name:'Maquette page-questionnaire', resp:'Concepteur', val:'Branco', start:4, dur:2, crit:false, pre:'W1' },\n      { id:'W4', grp:2, name:'Intégration page + formulaire', resp:'Concepteur', val:'Branco', start:6, dur:2, crit:true, pre:'W2 + W3 + A3' },\n      { id:'W5', grp:2, name:'Messages de sortie (3 types)', resp:'Branco + Conc.', val:'Branco', start:8, dur:1, crit:false, pre:'A5 + W4' },\n      { id:'W7', grp:2, name:'Conformité RGPD en ligne', resp:'Concepteur', val:'Branco (resp. trait.)', start:8, dur:1.5, crit:true, pre:'A8 + W4' },\n      { id:'W6', grp:2, name:'Circuit de tri manuel (SLA 48 h)', resp:'Branco', val:'Branco', start:9, dur:1, crit:false, pre:'W4 + W5 + A4' },\n      { id:'W9', grp:2, name:'Tests multi-appareils + accessibilité', resp:'Concepteur', val:'Concepteur', start:10, dur:1, crit:false, pre:'W4' },\n      { id:'W10', grp:2, name:'Recette bout-en-bout (J4)', resp:'Conc. + Branco', val:'Branco', start:11, dur:1, crit:true, pre:'W5–W9' },\n      { id:'W8', grp:2, name:'QR dynamique + tracking', resp:'Concepteur', val:'Branco', start:12, dur:0.5, crit:true, pre:'J4 + A2' }\n    ];\n\n    this.MILESTONES = [\n      { code:'J5', name:'Éditorial livret validé', day:2, deps:['L2'] },\n      { code:'J1', name:'Critères + questionnaire validés', day:3, deps:['A5'] },\n      { code:'J2', name:'Domaine acquis, URL figée', day:4, deps:['A1','W2'] },\n      { code:'J3', name:'Page en ligne + RGPD', day:9.5, deps:['W4','W7'] },\n      { code:'J4', name:'Parcours testé bout-en-bout', day:12, deps:['W10'] },\n      { code:'J6', name:'QR généré + scan testé', day:13, deps:['W8','L5'] },\n      { code:'J7', name:'BAT signé — non-retour', day:15.5, deps:['L6'] },\n      { code:'J8', name:'Go diffusion', day:23.5, deps:['L7'] }\n    ];\n\n    this.CHAIN = [\n      { ids:['A5'], lbl:'A5 — Critères + questionnaire (Branco)' },\n      { ids:['A1','W2'], lbl:'A1 · W2 — Domaine + URL (J2)' },\n s.WEB_LIST = [\n      'Questionnaire conforme au document validé par Branco (J1)',\n      'Mentions RGPD, politique de confidentialité, consentement',\n      'Notification e-mail à Branco testée (dossier spam vérifié)',\n      'Accusé de réception au répondant avec délai annoncé',\n      'Agenda en invitation uniquement — aucune réservation libre',\n      'Messages acceptation / refus validés par Branco',\n      'HTTPS actif, mobile OK, chargement rapide en 4G',\n      'Accessibilité : contrastes, labels, taille des cibles',\n      'Statistiques de scan et UTM actives',\n      'Procédure de tri écrite, SLA 48 h accepté par Branco'\n    ];\n  }\n\n  applyAccent() {\n    document.documentElement.style.setProperty('--ac', this.props.accent ?? '#E4604B');\n  }\n  componentDidMount() { this.applyAccent(); }\n  componentDidUpdate() { this.applyAccent(); }\n\n  persist() { try { localStorage.setItem('ds90-suivi', JSON.stringify(this.state)); } catch (e) {} }\n\n  parseStart() {\n    const p = (this.state.startDate || '2026-07-13').split('-').map(Number);\n    return new Date(p[0], p[1] - 1, p[2]);\n  }\n  addWork(n) {\n    const d = new Date(this.parseStart());\n    let c = 0;\n    while (c < n) { d.setDate(d.getDate() + 1); const w = d.getDay(); if (w !== 0 && w !== 6) c++; }\n    return d;\n  }\n  fmt(d) { return d.toLocaleDateString('fr-FR', { day: '2-digit', month: '2-digit' }); }\n\n  st(id) { return this.state.statuses[id] || 0; }\n\n  renderVals() {\n    const DAY = this.DAY;\n    const statuses = this.state.statuses;\n    const cycle = (id) => () => this.setState(s => ({ statuses: { ...s.statuses, [id]: ((s.statuses[id] || 0) + 1) % 3 } }), () => this.persist());\n    const toggle = (key) => () => this.setState(s => ({ checks: { ...s.checks, [key]: !s.checks[key] } }), () => this.persist());\n\n    const BG = ['#E9EDF3', '#1B3157', '#3E7D5F'];\n    const BORDER = ['1px solid #B9C2D0', '1px solid #1B3157', '1px solid #3E7D5F'];\n    const STXT = ['à faire', 'en cours', 'fait'];\n\n    const groupNames = ['A — Décisions amont', 'B1 — Flux livret', 'B2 — Flux web'];\n    const groups = groupNames.map((name, gi) => ({\n      name,\n      tasks: this.TASKS.filter(t => t.grp === gi).map(t => {\n        const s = this.st(t.id);\n        return {\n          code: t.id, name: t.name, crit: t.crit,\n          left: Math.round(t.start * DAY), w: Math.max(9, Math.round(t.dur * DAY)),\n          bg: BG[s], border: BORDER[s],\n          lblCol: s === 2 ? '#9AA3B2' : '#232c3a',\n          tip: t.id + ' — ' + t.name + '\\nResponsable : ' + t.resp + ' · Valideur : ' + t.val + '\\nPrérequis : ' + t.pre + ' · Durée : ' + t.dur + ' j\\nDu ' + this.fmt(this.addWork(Math.floor(t.start))) + ' au ' + this.fmt(this.addWork(Math.ceil(t.start + t.dur))) + '\\nStatut : ' + STXT[s] + ' (cliquer pour changer)',\n          onClick: cycle(t.id)\n        };\n      })\n    }));\n\n    const milestones = this.MILESTONES.map((m, i) => {\n      const ok = m.deps.every(d => this.st(d) === 2);\n      return {\n        code: m.code,\n        left: Math.round(m.day * DAY),\n        fill: ok ? '#101E33' : '#fff',\n        lblTop: i % 2 === 0 ? 2 : 26,\n        lblCol: ok ? '#101E33' : '#8a93a3',\n        tip: m.code + ' — ' + m.name + '\\nÉchéance : ' + this.fmt(this.addWork(Math.ceil(m.day))) + '\\n' + (ok ? 'Atteint (tâches amont faites)' : 'Non atteint — dépend de : ' + m.deps.join(', '))\n      };\n    });\n\n    const weeks = [0, 1, 2, 3, 4].map(i => ({\n      left: i * 5 * DAY,\n      label: 'S' + (i + 1) + ' · ' + this.fmt(i === 0 ? this.parseStart() : this.addWork(i * 5))\n    }));\n\n    // aujourd'hui\n    const start = this.parseStart();\n    const today = new Date(); today.setHours(0, 0, 0, 0);\n    let wd = 0; const cur = new Date(start);\n    while (cur < today && wd <= 30) { cur.setDate(cur.getDate() + 1); const w = cur.getDay(); if (w !== 0 && w !== 6) wd++; }\n    const showToday = today >= start && wd <= 24.5;\n\n    // KPIs\n    const totDur = this.TASKS.reduce((a, t) => a + t.dur, 0);\n    const doneDur = this.TASKS.reduce((a, t) => a + (this.st(t.id) === 2 ? t.dur : 0), 0);\n    const done = this.TASKS.filter(t => this.st(t.id) === 2).length;\n    const inProg = this.TASKS.filter(t => this.st(t.id) === 1).length;\n    const next = this.MILESTONES.slice().sort((a, b) => a.day - b.day).find(m => !m.deps.every(d => this.st(d) === 2));\n\n    const chain = this.CHAIN.map(c => {\n      const min = Math.min(...c.ids.map(id => this.st(id)));\n      const lastTask = this.TASKS.find(t => t.id === c.ids[c.ids.length - 1]);\n      return {\n        lbl: c.lbl,\n        mark: min === 2 ? '✓' : (min === 1 ? '…' : ''),\n        dotBg: min === 2 ? '#3E7D5F' : (min === 1 ? 'var(--ac, #E4604B)' : 'transparent'),\n        dotCol: '#fff',\n        dotBorder: min === 0 ? '#4A5B7C' : 'transparent',\n        txtCol: min === 2 ? '#7E8BA3' : '#fff',\n        date: this.fmt(this.addWork(Math.ceil(lastTask.start + lastTask.dur)))\n      };\n    });\n\n    const mkCheck = (list, prefix) => list.map((label, i) => {\n      const key = prefix + i; const on = !!this.state.checks[key];\n      return {\n        label, onClick: toggle(key), mark: on ? '✓' : '',\n        boxBg: on ? '#101E33' : 'transparent',\n        boxBg2: on ? 'var(--ac, #E4604B)' : 'transparent',\n        col: on ? '#9AA3B2' : '#3a4356'\n      };\n    });\n    const printList = mkCheck(this.PRINT_LIST, 'p');\n    const webList = mkCheck(this.WEB_LIST, 'w');\n    const cnt = (list, prefix) => list.filter((_, i) => this.state.checks[prefix + i]).length + ' / ' + list.length;\n\n    return {\n      startDate: this.state.startDate,\n      onStartDate: (e) => this.setState({ startDate: e.target.value }, () => this.persist()),\n      kpiPct: Math.round(100 * doneDur / totDur),\n      kpiDone: done, kpiTotal: this.TASKS.length, kpiInProgress: inProg,\n      kpiNextCode: next ? next.code + ' · ' + this.fmt(this.addWork(Math.ceil(next.day))) : '—',\n      kpiNextName: next ? next.name : 'Tous les jalons sont atteints',\n      kpiEnd: this.fmt(this.addWork(24)),\n      groups, milestones, weeks, chain,\n      showToday, todayX: 250 + Math.min(24.5, wd) * DAY,\n      risks: this.RISKS,\n      printList, webList,\n      printCount: cnt(this.PRINT_LIST, 'p'),\n      webCount: cnt(this.WEB_LIST, 'w')\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
